<svg width="200" height="210" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="44" fill="#06090d" style="fill:rgb(6, 9, 13);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- outer glow ring (faint) -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#f5c800" stroke-width="3" opacity="0.15" style="fill:none;stroke:rgb(245, 200, 0);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- arc of power symbol — gap at top -->
  <path d="M 100 36&#10;           A 64 64 0 1 1 99.9 36" fill="none" stroke="#f5c800" stroke-width="14" stroke-linecap="round" stroke-dasharray="340 400" stroke-dashoffset="-30" style="fill:none;stroke:rgb(245, 200, 0);color:rgb(255, 255, 255);stroke-width:14px;stroke-dasharray:340px, 400px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- vertical stem -->
  <line x1="100" y1="36" x2="100" y2="84" stroke="#f5c800" stroke-width="14" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(245, 200, 0);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- center dot glow -->
  <circle cx="100" cy="100" r="6" fill="#f5c800" opacity="0.4" style="fill:rgb(245, 200, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>